name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./... -v

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build Linux arm64
        run: GOOS=linux GOARCH=arm64 go build -o conctl-linux-arm64 ./cmd/conctl/
      - name: Build Linux amd64
        run: GOOS=linux GOARCH=amd64 go build -o conctl-linux-amd64 ./cmd/conctl/
      - uses: actions/upload-artifact@v4
        with:
          name: conctl-binaries
          path: conctl-linux-*
